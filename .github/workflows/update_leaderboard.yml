name: Update Global Leaderboard

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update-scores:
    if: startsWith(github.event.issue.title, '[SCORE_SUBMIT]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Leaderboard Updater Script
        id: updater
        continue-on-error: true
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/update_leaderboard.js

      - name: Check Auth Failure and Comment
        if: steps.updater.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const failFile = path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/auth_failed.txt');
            
            let message = "⚠️ **글로벌 랭킹 등록 실패!**\n\n데이터 검증 오류가 발생하여 등록에 실패하였습니다.";
            if (fs.existsSync(failFile)) {
              message = `🚨 **글로벌 랭킹 등록 거부 (닉네임 도용 방지)**\n\n${fs.readFileSync(failFile, 'utf8')}\n\n등록을 원하시면 올바른 비밀번호를 입력하거나 다른 닉네임으로 도전하세요!`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['invalid-score']
            });
            process.exit(1);

      - name: Commit and Push Leaderboard Changes
        run: |
          git config --global user.name "Toilet Bot 🧻"
          git config --global user.email "toilet-bot@github.com"
          git add public/leaderboard.json public/users.json public/ghost_level_*.json
          git commit -m "chore: update global leaderboard & user database [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Close Issue and Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🎉 **글로벌 랭킹 등록 완료!**\n\n귀하의 명예로운 괄약근 점수가 전 세계 리더보드에 영구 박제되었습니다. Vercel 배포망을 타고 몇 분 내로 실시간 반영됩니다. 🚽✨"
            });
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
